<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vida Tántrico - Camilo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #4338ca; --accent: #d35400; --bg: #f0f4f8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 30px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .edu-section { background: #eef2ff; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #c7d2fe; }
        .glossary { background: #f8fafc; padding: 25px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .glossary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; font-size: 0.85rem; }
        .star-box { position: relative; width: 320px; height: 320px; margin: 40px auto; display: flex; align-items: center; justify-content: center; }
        .star-svg { width: 100%; height: 100%; }
        .star-svg polygon { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 5; }
        .node { position: absolute; width: 55px; height: 55px; background: white; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; border: 3px solid var(--primary); box-shadow: 0 8px 15px rgba(0,0,0,0.1); z-index: 10; }
        .node.mission { border-color: #10b981; color: #10b981; } /* Color Verde para Misión según captura */
        .label-float { position: absolute; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #64748b; background: white; padding: 2px 8px; border-radius: 10px; }
        .input-area { background: var(--primary); color: white; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        select, input[type="date"] { padding: 12px; border-radius: 10px; border: none; width: 85%; max-width: 250px; margin: 10px 0; font-weight: 600; }
        .btn { background: var(--accent); color: white; border: none; padding: 18px 40px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; text-transform: uppercase; }
        .result-card { border-left: 8px solid var(--primary); background: #fff; padding: 25px; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .detail-row { margin-bottom: 8px; font-size: 0.95rem; }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: right; margin-bottom: 20px;">
        <select id="langSelect" onchange="updateLanguage()">
            <option value="es">Español</option>
            <option value="en">English</option>
        </select>
    </div>
    <h1 id="mainTitle" style="text-align:center; color:var(--primary);">Mapa de Vida Tántrico</h1>
    
    <div class="edu-section" id="eduContent">
        <h2 id="eduTitle"></h2><p id="eduText"></p>
    </div>

    <div class="glossary">
        <h3 id="glossaryTitle"></h3><div class="glossary-grid" id="glossaryGrid"></div>
    </div>

    <div class="input-area">
        <label id="dateLabel"></label><br><input type="date" id="birthDate">
        <button class="btn" id="genBtn" onclick="generate()"></button>
    </div>

    <div id="results" style="display:none;">
        <div id="capture">
            <div class="star-box">
                <svg class="star-svg" viewBox="0 0 200 200"><polygon points="100,15 130,185 15,75 185,75 70,185" /></svg>
                <div class="node" style="top:-10px; left:125px; border-color:#d35400; color:#d35400;" id="n1"></div><div class="label-float" style="top:-25px; left:130px;" id="lb1"></div>
                <div class="node" style="bottom:5px; right:30px; border-color:#d35400; color:#d35400;" id="n2"></div><div class="label-float" style="bottom:-15px; right:25px;" id="lb2"></div>
                <div class="node" style="top:110px; left:-10px; border-color:#d35400; color:#d35400;" id="n3"></div><div class="label-float" style="top:95px; left:-25px;" id="lb3"></div>
                <div class="node" style="top:110px; right:-10px; border-color:#d35400; color:#d35400;" id="n4"></div><div class="label-float" style="top:95px; right:-25px;" id="lb4"></div>
                <div class="node mission" style="bottom:5px; left:30px;" id="n5"></div><div class="label-float" style="bottom:-15px; left:25px; color:#10b981;" id="lb5"></div>
            </div>
            <div id="details"></div>
        </div>
        <button class="btn" style="background:#1e293b; margin-top:20px;" id="pdfBtn" onclick="download()"></button>
    </div>
</div>

<script>
const I18N = {
    es: {
        title: "Mapa de Vida Tántrico",
        eduT: "¿Qué es la Numerología?",
        eduD: "Disciplina ancestral que estudia la relación mística entre números y eventos para identificar talentos y propósitos.",
        glosT: "Los 5 Pilares de tu Ser",
        pils: ["Alma: Tu mundo interior.","Karma: Tu relación externa.","Regalo: Tu don natural.","Destino: Maestría de vidas pasadas.","Misión: Tu propósito final."],
        labs: ["Alma", "Karma", "Regalo", "Destino", "Misión"],
        btn: "✨ GENERAR MAPA PROFUNDO",
        dateL: "Ingresa tu Fecha de Nacimiento:",
        pdf: "📥 Descargar Reporte",
        tags: { esc: "Esencia", som: "Sombra", mis: "Misión", act: "Activación" },
        archs: {
            1: { t: "Pionero", e: "Mente Positiva e inicio.", s: "Ego y aislamiento.", m: "Liderar con humildad.", a: "Iniciar un proyecto personal." },
            2: { t: "Acompañante", e: "Mente Negativa y prudencia.", s: "Duda constante.", m: "Colaborar sin perderse.", a: "Escuchar la intuición." },
            3: { t: "Artista / Comunicador", e: "Mente Positiva y alegría.", s: "Depresión o dispersión.", m: "Comunicar con amor.", a: "Expresión creativa." },
            4: { t: "Arquitecto", e: "Mente Neutral y orden.", s: "Rigidez mental.", m: "Construir bases sólidas.", a: "Organizar espacios." },
            5: { t: "Explorador", e: "Cuerpo físico y libertad.", s: "Irresponsabilidad.", m: "Aprender del mundo.", a: "Viajar o moverse." },
            6: { t: "Nutridor Responsable", e: "Línea de Arco y amor.", s: "Control excesivo.", m: "Armonizar el entorno.", a: "Cuidar la vida." },
            7: { t: "Líder Inspirador", e: "Aura y elevación.", s: "Orgullo.", m: "Elevar a otros.", a: "Meditación profunda." },
            8: { t: "Alquimista Poderoso", e: "Cuerpo Pránico y abundancia.", s: "Codicia o miedo.", m: "Sanar con recursos.", a: "Uso de cristales." },
            9: { t: "Sabio / Humanitario", e: "Cuerpo Sutil y calma.", s: "Desconexión.", m: "Servir a la humanidad.", a: "Acto de servicio." },
            10: { t: "Viajero / Guerrero", e: "Cuerpo Radiante y valor.", s: "Duda y parálisis.", m: "Fluir con valor.", a: "Tomar decisiones." },
            11: { t: "Líder Espiritual", e: "Conexión divina.", s: "Confusión interna.", m: "Inspirar con el ejemplo.", a: "Meditar 11 min." },
            22: { t: "Maestro Constructor", e: "Visión global.", s: "Agobio por potencial.", m: "Crear para la humanidad.", a: "Planificar consciente." }
        }
    },
    en: {
        title: "Tantric Life Map",
        eduT: "What is Numerology?",
        eduD: "Ancient discipline studying the mystical link between numbers and life events.",
        glosT: "The 5 Pillars of Your Being",
        pils: ["Soul: Inner self.","Karma: Outer world.","Gift: Innate gift.","Destiny: Past lives.","Mission: Final purpose."],
        labs: ["Soul", "Karma", "Gift", "Destiny", "Mission"],
        btn: "✨ GENERATE DEEP MAP",
        dateL: "Enter Birth Date:",
        pdf: "📥 Download Report",
        tags: { esc: "Essence", som: "Shadow", mis: "Mission", act: "Activation" },
        archs: {
            1: { t: "Pioneer", e: "Positive mind & start.", s: "Ego & isolation.", m: "Leading with humility.", a: "Start a personal project." },
            22: { t: "Master Builder", e: "Global vision.", s: "Overwhelmed by potential.", m: "Create for humanity.", a: "Conscious planning." }
            // Los demás se llenan igual...
        }
    }
};

function updateLanguage() {
    const l = I18N[document.getElementById('langSelect').value] || I18N.es;
    document.getElementById('mainTitle').innerText = l.title;
    document.getElementById('eduTitle').innerText = l.eduT;
    document.getElementById('eduText').innerText = l.eduD;
    document.getElementById('glossaryTitle').innerText = l.glosT;
    document.getElementById('dateLabel').innerText = l.dateL;
    document.getElementById('genBtn').innerText = l.btn;
    document.getElementById('pdfBtn').innerText = l.pdf;
    document.getElementById('glossaryGrid').innerHTML = l.pils.map(p => `<div class="glossary-item"><b>${p.split(':')[0]}</b> ${p.split(':')[1]}</div>`).join('');
    l.labs.forEach((txt, i) => document.getElementById('lb'+(i+1)).innerText = txt);
}

function generate() {
    const val = document.getElementById('birthDate').value;
    if(!val) return;
    const l = I18N[document.getElementById('langSelect').value] || I18N.es;
    const [y, m, d] = val.split('-').map(Number);
    const red = (n) => {
        if(n === 11 || n === 22) return n;
        while(n > 11 && n !== 22) n = String(n).split('').reduce((a,b)=>a+parseInt(b),0);
        return n;
    };
    const resArr = [red(d), red(m), red(parseInt(String(y).slice(-2))), red(String(y).split('').reduce((a,b)=>a+parseInt(b),0)), 0];
    resArr[4] = red(resArr[0] + resArr[1] + resArr[3]);
    
    resArr.forEach((v, i) => document.getElementById('n'+(i+1)).innerText = v);
    
    let html = "";
    resArr.forEach((num, i) => {
        const a = l.archs[num] || { t: "Explorador", e: "Energía fluyendo.", s: "Duda.", m: "Seguir.", a: "Moverse." };
        html += `<div class="result-card">
            <h3 style="margin-top:0; color:var(--primary);">${l.labs[i]}: ${a.t} (${num})</h3>
            <div class="detail-row">✨ <b>${l.tags.esc}:</b> ${a.e}</div>
            <div class="detail-row">🌑 <b>${l.tags.som}:</b> ${a.s}</div>
            <div class="detail-row">🎯 <b>${l.tags.mis}:</b> ${a.m}</div>
            <div class="detail-row">⚡ <b>${l.tags.act}:</b> ${a.a}</div>
        </div>`;
    });
    document.getElementById('details').innerHTML = html;
    document.getElementById('results').style.display = 'block';
}

function download() {
    html2pdf().from(document.getElementById('capture')).set({ margin: 10, filename: 'Mapa_Vida_Verificado.pdf', html2canvas: { scale: 2 } }).save();
}
updateLanguage();
</script>
</body>
</html>
