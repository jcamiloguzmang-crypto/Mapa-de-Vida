<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vida Pro v2.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --accent: #d35400; --bg: #f4f7f6; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .visual-map { position: relative; width: 250px; height: 250px; margin: 40px auto; }
        .star-svg { width: 100%; height: 100%; fill: none; stroke: #ddd; stroke-width: 2; }
        .node { position: absolute; width: 40px; height: 40px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .node-label { position: absolute; font-size: 0.75rem; font-weight: bold; color: #555; width: 80px; text-align: center; }
        .card { text-align: left; background: #fff; border-left: 6px solid var(--accent); padding: 20px; margin: 15px 0; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--accent); color: white; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>Mapa de Vida</h1>
    <p><i>Análisis Profundo de Numerología Evolutiva</i></p>
    
    <select id="lang" style="padding:10px; margin-bottom:20px;">
        <option value="es">Español 🇪🇸</option>
        <option value="fr">Français 🇫🇷</option>
        <option value="en">English 🇺🇸</option>
    </select>

    <input type="date" id="birthDate" style="padding:15px; width:70%; border-radius:10px; border:1px solid #ccc;">
    <button class="btn btn-main" onclick="generate()">🔮 GENERAR MAPA PROFUNDO</button>

    <div id="results" style="display:none;">
        <div id="pdf-area" style="padding:20px;">
            <div class="visual-map">
                <svg class="star-svg" viewBox="0 0 200 200"><polygon points="100,10 125,190 10,70 190,70 75,190" /></svg>
                <div class="node" style="top:-20px; left:105px;" id="n-alma"></div>
                <div class="node-label" style="top:-40px; left:85px;">ALMA</div>
                <div class="node" style="top:180px; left:145px;" id="n-karma"></div>
                <div class="node-label" style="top:225px; left:125px;">KARMA</div>
                <div class="node" style="top:55px; left:-20px;" id="n-gift"></div>
                <div class="node-label" style="top:65px; left:-100px;">REGALO</div>
                <div class="node" style="top:55px; right:-20px;" id="n-dest"></div>
                <div class="node-label" style="top:65px; right:-100px;">DESTINO</div>
                <div class="node" style="top:180px; left:65px; background:#27ae60;" id="n-miss"></div>
                <div class="node-label" style="top:225px; left:45px;">MISIÓN</div>
            </div>
            <div id="details"></div>
        </div>
        <button class="btn" style="background:#2980b9; color:white;" onclick="downloadPDF()">📄 DESCARGAR PDF</button>
        <button class="btn" style="background:#25d366; color:white;" onclick="shareWA()">📲 COMPARTIR WHATSAPP</button>
    </div>
</div>

<script>
const ARQ = {
    1: { t: "El Líder Inconsciente", e: "Iniciativa y coraje.", s: "Egoísmo.", m: "Liderar con bondad.", a: "Caminar descalzo." },
    4: { t: "El Organizador", e: "Estructura y servicio.", s: "Terquedad.", m: "Poner el intelecto al servicio del bien.", a: "Respiración rítmica." },
    8: { t: "El Sanador", e: "Sanación y abundancia.", s: "Obsesión material.", m: "Sanar a otros.", a: "Uso de cristales." },
    9: { t: "El Maestro", e: "Sabiduría universal.", s: "Apego.", m: "Enseñar con amor.", a: "Meditación de silencio." },
    10: { t: "El Guerrero", e: "Coraje y resolución.", s: "Miedo.", m: "Iluminar sin destruir.", a: "Meditación solar." },
    22: { t: "El Maestro Constructor", e: "Visión global.", s: "Arrogancia.", m: "Crear para la humanidad.", a: "Planificación consciente." }
};

function reduce(n) {
    if (n === 11 || n === 22) return n;
    while (n > 11 && n !== 22) n = String(n).split('').reduce((a, b) => a + parseInt(b), 0);
    return n;
}

function generate() {
    const val = document.getElementById('birthDate').value;
    if (!val) return alert("Selecciona tu fecha");
    const [y, m, d] = val.split('-').map(Number);
    const data = {
        "ALMA": reduce(d),
        "KARMA": reduce(m),
        "REGALO": reduce(parseInt(String(y).slice(-2))),
        "DESTINO": reduce(String(y).split('').reduce((a,b)=>a+parseInt(b),0)),
        "MISIÓN": 0
    };
    data["MISIÓN"] = reduce(data["ALMA"] + data["KARMA"] + data["DESTINO"]);

    document.getElementById('n-alma').innerText = data["ALMA"];
    document.getElementById('n-karma').innerText = data["KARMA"];
    document.getElementById('n-gift').innerText = data["REGALO"];
    document.getElementById('n-dest').innerText = data["DESTINO"];
    document.getElementById('n-miss').innerText = data["MISIÓN"];

    let html = "";
    for (let key in data) {
        const info = ARQ[data[key]] || { t: "Viajero", e: "Evolución", s: "Duda", m: "Seguir", a: "Fluir" };
        html += `<div class="card">
            <h3 style="margin:0; color:var(--accent)">${key}: ${info.t} (${data[key]})</h3>
            <p><strong>✨ Esencia:</strong> ${info.e}</p>
            <p><strong>🎯 Misión:</strong> ${info.m}</p>
            <p><strong>⚡ Activación:</strong> ${info.a}</p>
        </div>`;
    }
    document.getElementById('details').innerHTML = html;
    document.getElementById('results').style.display = 'block';
}

function downloadPDF() {
    const element = document.getElementById('pdf-area');
    html2pdf().from(element).set({ margin: 10, filename: 'Mi_Mapa.pdf', html2canvas: { scale: 2 } }).save();
}

function shareWA() {
    window.open(`https://wa.me/?text=¡Mira mi Mapa de Vida! Genéralo aquí: ${window.location.href}`, '_blank');
}
</script>
</body>
</html>
