<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vida Tántrico - Camilo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #4338ca; --accent: #d35400; --mission: #10b981; --bg: #f0f4f8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 30px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .edu-section { background: #eef2ff; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #c7d2fe; }
        .glossary { background: #f8fafc; padding: 25px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .glossary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; font-size: 0.85rem; }
        .star-box { position: relative; width: 320px; height: 320px; margin: 40px auto; display: flex; align-items: center; justify-content: center; }
        .star-svg { width: 100%; height: 100%; }
        .star-svg polygon { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 5; }
        .node { position: absolute; width: 55px; height: 55px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; border: 3px solid var(--accent); color: var(--accent); box-shadow: 0 8px 15px rgba(0,0,0,0.1); z-index: 10; }
        .node.mission-node { border-color: var(--mission); color: var(--mission); }
        .label-float { position: absolute; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #64748b; background: white; padding: 2px 8px; border-radius: 10px; }
        .input-area { background: var(--primary); color: white; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        select, input[type="date"] { padding: 12px; border-radius: 10px; border: none; width: 85%; max-width: 250px; margin: 10px 0; font-weight: 600; font-size: 1rem; }
        .btn { background: var(--accent); color: white; border: none; padding: 18px 40px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; text-transform: uppercase; }
        .result-card { border-left: 8px solid var(--primary); background: #fff; padding: 25px; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .detail-row { margin-bottom: 8px; font-size: 0.95rem; }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: right; margin-bottom: 20px;">
        <select id="langSelect" onchange="updateLanguage()">
            <option value="es">Español</option>
            <option value="en">English</option>
        </select>
    </div>
    <h1 id="mainTitle" style="text-align:center; color:var(--primary);">Mapa de Vida Tántrico</h1>
    
    <div class="edu-section"><h2 id="eduTitle"></h2><p id="eduText"></p></div>
    <div class="glossary"><h3 id="glossaryTitle"></h3><div class="glossary-grid" id="glossaryGrid"></div></div>

    <div class="input-area">
        <label id="dateLabel"></label><br><input type="date" id="birthDate"><br>
        <button class="btn" id="genBtn" onclick="generate()"></button>
    </div>

    <div id="results" style="display:none;">
        <div id="capture">
            <div class="star-box">
                <svg class="star-svg" viewBox="0 0 200 200"><polygon points="100,15 130,185 15,75 185,75 70,185" /></svg>
                <div class="node" style="top:-10px; left:125px;" id="n1"></div><div class="label-float" style="top:-25px; left:130px;" id="lb1"></div>
                <div class="node" style="bottom:5px; right:30px;" id="n2"></div><div class="label-float" style="bottom:-15px; right:25px;" id="lb2"></div>
                <div class="node" style="top:110px; left:-10px;" id="n3"></div><div class="label-float" style="top:95px; left:-25px;" id="lb3"></div>
                <div class="node" style="top:110px; right:-10px;" id="n4"></div><div class="label-float" style="top:95px; right:-25px;" id="lb4"></div>
                <div class="node mission-node" style="bottom:5px; left:30px;" id="n5"></div><div class="label-float" style="bottom:-15px; left:25px; color:var(--mission);" id="lb5"></div>
            </div>
            <div id="details"></div>
        </div>
        <button class="btn" style="background:#1e293b; margin-top:20px;" id="pdfBtn" onclick="download()"></button>
    </div>
</div>

<script>
const I18N = {
    es: {
        main: "Mapa de Vida Tántrico",
        eduT: "¿Qué es la Numerología Tántrica?",
        eduD: "Un sistema de autoconocimiento que utiliza tu fecha de nacimiento para identificar tus desafíos y dones naturales.",
        gloT: "Los 5 Pilares de tu Ser",
        pils: ["Alma: Tu mundo interior.","Karma: Desafíos externos.","Regalo: Tu don natural.","Destino: Maestría pasada.","Misión: Tu propósito final."],
        labs: ["Alma", "Karma", "Regalo", "Destino", "Misión"],
        btn: "✨ GENERAR MAPA DE LUZ",
        date: "Ingresa tu Fecha de Nacimiento:",
        pdf: "📥 Descargar Reporte",
        tags: ["Esencia", "Sombra", "Misión", "Activación"],
        archs: {
            1: ["Pionero", "Iniciativa y voluntad.", "Ego y aislamiento.", "Liderar con humildad.", "Iniciar proyectos."],
            3: ["Artista", "Alegría y creatividad.", "Dispersión.", "Comunicar con amor.", "Expresar emociones."],
            4: ["Arquitecto", "Mente neutral y orden.", "Rigidez.", "Construir bases.", "Organizar vida."],
            5: ["Explorador", "Adaptabilidad y libertad.", "Irresponsabilidad.", "Aprender experiencia.", "Probar algo nuevo."],
            6: ["Nutridor Responsable", "Amor y compasión.", "Control.", "Armonizar entorno.", "Cuidar la vida."],
            8: ["Alquimista Poderoso", "Gestión de abundancia.", "Codicia.", "Sanar con recursos.", "Uso de cristales."],
            9: ["Sabio", "Integridad y calma.", "Desapego.", "Servir a los demás.", "Acto de bondad."],
            10: ["Viajero / Guerrero", "Evolución y cambio.", "Duda y parálisis.", "Fluir con valor.", "Tomar decisiones."],
            11: ["Líder Espiritual", "Conexión divina.", "Confusión.", "Inspirar ejemplo.", "Meditar 11 min."],
            22: ["Maestro Constructor", "Visión global.", "Agobio por potencial.", "Construir para todos.", "Planificar futuro."]
        }
    },
    en: {
        main: "Tantric Life Map",
        eduT: "What is Tantric Numerology?",
        eduD: "A self-knowledge system using your birth date to identify challenges and natural gifts.",
        gloT: "The 5 Pillars of Your Being",
        pils: ["Soul: Inner self.","Karma: Outer challenges.","Gift: Natural gift.","Destiny: Past mastery.","Mission: Final purpose."],
        labs: ["Soul", "Karma", "Gift", "Destiny", "Mission"],
        btn: "✨ GENERATE LIGHT MAP",
        date: "Enter Birth Date:",
        pdf: "📥 Download Report",
        tags: ["Essence", "Shadow", "Mission", "Activation"],
        archs: {
            1: ["Pioneer", "Initiative and will.", "Ego and isolation.", "Leading with humility.", "Start projects."],
            3: ["Artist", "Joy and creativity.", "Scattering.", "Communicate with love.", "Express emotions."],
            6: ["Responsible Nurturer", "Love and compassion.", "Control.", "Harmonizing environment.", "Nurture life."],
            8: ["Powerful Alchemist", "Abundance management.", "Greed.", "Healing with resources.", "Use of crystals."],
            10: ["Traveler / Warrior", "Evolution and change.", "Doubt and paralysis.", "Flow with courage.", "Take decisions."],
            11: ["Spiritual Leader", "Divine connection.", "Confusion.", "Inspire by example.", "Meditate 11 min."],
            22: ["Master Builder", "Global vision.", "Overwhelmed.", "Build for everyone.", "Future planning."]
        }
    }
};

function updateLanguage() {
    const l = I18N[document.getElementById('langSelect').value];
    document.getElementById('mainTitle').innerText = l.main;
    document.getElementById('eduTitle').innerText = l.eduT;
    document.getElementById('eduText').innerText = l.eduD;
    document.getElementById('glossaryTitle').innerText = l.gloT;
    document.getElementById('dateLabel').innerText = l.date;
    document.getElementById('genBtn').innerText = l.btn;
    document.getElementById('pdfBtn').innerText = l.pdf;
    document.getElementById('glossaryGrid').innerHTML = l.pils.map(p => `<div><b>${p.split(':')[0]}</b>${p.split(':')[1]}</div>`).join('');
    l.labs.forEach((txt, i) => document.getElementById('lb'+(i+1)).innerText = txt);
}

function generate() {
    const val = document.getElementById('birthDate').value;
    if(!val) return;
    const l = I18N[document.getElementById('langSelect').value];
    const [y, m, d] = val.split('-').map(Number);
    const red = (n) => {
        if(n === 11 || n === 22) return n;
        while(n > 11 && n !== 22) n = String(n).split('').reduce((a,b)=>a+parseInt(b),0);
        return n;
    };
    const res = [red(d), red(m), red(parseInt(String(y).slice(-2))), red(String(y).split('').reduce((a,b)=>a+parseInt(b),0)), 0];
    res[4] = red(res[0] + res[1] + res[3]);
    
    res.forEach((v, i) => document.getElementById('n'+(i+1)).innerText = v);
    
    let html = "";
    res.forEach((num, i) => {
        const a = l.archs[num] || ["Explorer", "Energy.", "Doubt.", "Follow.", "Move."];
        html += `<div class="result-card">
            <h3 style="margin:0 0 10px 0; color:var(--primary);">${l.labs[i]}: ${a[0]} (${num})</h3>
            <div class="detail-row">✨ <b>${l.tags[0]}:</b> ${a[1]}</div>
            <div class="detail-row">🌑 <b>${l.tags[1]}:</b> ${a[2]}</div>
            <div class="detail-row">🎯 <b>${l.tags[2]}:</b> ${a[3]}</div>
            <div class="detail-row">⚡ <b>${l.tags[3]}:</b> ${a[4]}</div>
        </div>`;
    });
    document.getElementById('details').innerHTML = html;
    document.getElementById('results').style.display = 'block';
}

function download() {
    html2pdf().from(document.getElementById('capture')).set({ margin: 10, filename: 'Mapa_Vida_Tantrico.pdf', html2canvas: { scale: 2 } }).save();
}
updateLanguage();
</script>
</body>
</html>
