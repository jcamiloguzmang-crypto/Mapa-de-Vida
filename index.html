<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vida - v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #d35400; --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; }
        [data-theme="high-contrast"] { --primary: #000; --accent: #ffff00; --bg: #000; --card: #000; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; transition: 0.3s; }
        .container { max-width: 600px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ccc; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .btn-calc { background: var(--accent); color: #000; }
        .card { text-align: left; background: var(--card); border-left: 5px solid var(--accent); padding: 15px; margin: 10px 0; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select { padding: 10px; width: 90%; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mapa de Vida</h1>
        <p>Boussole numérique pour l'évolution personnelle</p>
        
        <select id="lang" onchange="updateLang()">
            <option value="es">Español 🇪🇸</option>
            <option value="fr">Français 🇫🇷</option>
            <option value="en">English 🇺🇸</option>
        </select>
        <button onclick="toggleTheme()" class="btn">🌓 Alto Contraste</button>

        <label id="lblDate">Fecha de Nacimiento:</label><br>
        <input type="date" id="birthDate">
        <button class="btn btn-calc" onclick="generate()">🔮 Generar Mi Mapa</button>

        <div id="results" style="display:none; margin-top:20px;">
            <div id="capture-area">
                <h2 id="resTitle">Tu Análisis Numerológico</h2>
                <div id="details"></div>
            </div>
            <button class="btn" style="background:#2980b9; color:white;" onclick="downloadPDF()">📄 Descargar PDF</button>
        </div>
    </div>

<script>
    const arq = {
        1: { t: "Líder", m: "Liderar con bondad." }, 2: { t: "Mediador", m: "Diplomacia y unión." },
        3: { t: "Artista", m: "Expresar alegría." }, 4: { t: "Organizador", m: "Estructura y servicio." },
        5: { t: "Disciplinado", m: "Dominio del cuerpo." }, 6: { t: "Místico", m: "Intuición y fe." },
        7: { t: "Inspirador", m: "Liderazgo compasivo." }, 8: { t: "Sanador", m: "Sanación y abundancia." },
        9: { t: "Maestro", m: "Sabiduría universal." }, 10: { t: "Guerrero", m: "Coraje y resolución." },
        11: { t: "Faro", m: "Despertar conciencias." }
    };

    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'high-contrast' ? '' : 'high-contrast'; }

    function reduce(n) {
        if (n === 11 || n === 22) return n;
        while (n > 11) n = String(n).split('').reduce((a, b) => a + parseInt(b), 0);
        return n;
    }

    function generate() {
        const val = document.getElementById('birthDate').value;
        if (!val) return alert("Por favor selecciona una fecha");
        const [y, m, d] = val.split('-').map(Number);
        
        const res = {
            Alma: reduce(d),
            Karma: reduce(m),
            Regalo: reduce(parseInt(String(y).slice(-2))),
            Destino: reduce(String(y).split('').reduce((a,b)=>a+parseInt(b),0)),
            Misión: 0
        };
        res.Misión = reduce(res.Alma + res.Karma + res.Destino);

        let html = "";
        for (let k in res) {
            const a = arq[res[k]] || { t: "Viajero", m: "Evolución continua" };
            html += `<div class="card"><strong>${k} (${res[k]}):</strong> ${a.t}<br><small>${a.m}</small></div>`;
        }
        document.getElementById('details').innerHTML = html;
        document.getElementById('results').style.display = 'block';
    }

    function downloadPDF() {
        const element = document.getElementById('capture-area');
        html2pdf().from(element).set({ margin: 10, filename: 'Mapa_Vida.pdf', html2canvas: { scale: 2 } }).save();
    }
</script>
</body>
</html>
